<!DOCTYPE html><html><head><style>body{margin:0;background:#5a5f4a}</style>
<script type="importmap">{"imports":{"three":"./vendor/three.module.js"}}</script></head>
<body><canvas id="c"></canvas>
<script type="module">
import * as THREE from 'three';
import { buildExosuit } from './src/exosuit.js';
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x5a5f4a);
const cam = new THREE.PerspectiveCamera(32, 1, 0.1, 100);
const r = new THREE.WebGLRenderer({canvas:document.getElementById('c'), antialias:true});
r.setSize(820,820); r.shadowMap.enabled=true;
scene.add(new THREE.HemisphereLight(0xbfc8d0,0x50482c,0.9));
const d = new THREE.DirectionalLight(0xfff0d0,1.6); d.position.set(6,12,4); d.castShadow=true; scene.add(d);
const g = new THREE.Mesh(new THREE.PlaneGeometry(40,40), new THREE.MeshStandardMaterial({color:0x4e5340}));
g.rotation.x=-Math.PI/2; g.receiveShadow=true; scene.add(g);
const suit = buildExosuit(); suit.scale.setScalar(1); scene.add(suit);
const ud = suit.userData;
const CORE_Y = ud.core.position.y, HUNCH = ud.torso.rotation.x;
window.setPose = (phase, lean, camAng) => {
  const amp=0.5;
  ud.legs[0].userData.thigh.rotation.x = Math.sin(phase)*amp;
  ud.legs[1].userData.thigh.rotation.x = Math.sin(phase+Math.PI)*amp;
  const l0=Math.max(0,-Math.cos(phase)), l1=Math.max(0,-Math.cos(phase+Math.PI));
  ud.legs[0].userData.knee.rotation.x=l0*0.75; ud.legs[1].userData.knee.rotation.x=l1*0.75;
  ud.legs[0].userData.shin.rotation.x=-l0*0.35; ud.legs[1].userData.shin.rotation.x=-l1*0.35;
  ud.core.position.y = CORE_Y - 0.12 + Math.abs(Math.sin(phase))*0.42;
  ud.torso.rotation.x = HUNCH + lean;
  const armBob = Math.sin(phase)*0.06;
  ud.gunArm.rotation.x = Math.sin(phase+Math.PI)*0.07;
  ud.arms[1].rotation.x = Math.sin(phase)*0.07;
  ud.gunArm.userData.forearm.rotation.x = ud.gunArm.userData.forearmBase + armBob;
  ud.arms[1].userData.forearm.rotation.x = ud.arms[1].userData.forearmBase - armBob;
  const R=13;
  cam.position.set(Math.sin(camAng)*R, 5.5, Math.cos(camAng)*R);
  cam.lookAt(0,2.3,0);
  r.render(scene,cam);
};
r.render(scene,cam);
window.__ready = true;
</script></body></html>
